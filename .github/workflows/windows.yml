name: Windows Tests (MSVC/Clang-CL C++20/26)

on:
  push:
    branches: [ master, integration ]
  pull_request:
    branches: [ master, integration ]

jobs:
  build:
    name: ${{ matrix.config.name }} C++${{ matrix.cxx_standard }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        cxx_standard: [20, 26]
        config:
          - {
              name: "Windows MSVC",
              toolset: ""
            }
          - {
              name: "Windows Clang-CL",
              toolset: "ClangCL"
            }

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup CMake
      uses: lukka/get-cmake@v4.3.2
      with:
        cmakeVersion: '4.3.2'
        useCloudCache: false

    - name: Configure CMake (Windows)
      shell: pwsh
      run: |
        $buildDir = "build-cxx${{ matrix.cxx_standard }}"
        $arguments = @(
          "-B", $buildDir,
          "-G", "Visual Studio 18 2026",
          "-A", "x64",
          "-DCBOR_TAGS_BUILD_TESTS=ON"
        )
        if ("${{ matrix.cxx_standard }}" -eq "26") {
          # CMake 4.3 supports the VS 2026 generator but does not model its C++26 preview mode.
          $cxxFlags = "/std:c++latest"
          if ("${{ matrix.config.toolset }}" -eq "ClangCL") {
            $cxxFlags += " -Wno-unused-command-line-argument"
          }
          $arguments += @(
            "-DCMAKE_CXX_STANDARD=23",
            "-DCMAKE_CXX_STANDARD_REQUIRED=ON",
            "-DCMAKE_CXX_EXTENSIONS=OFF",
            "-DCMAKE_CXX_FLAGS_INIT=$cxxFlags"
          )
        } else {
          $arguments += @(
            "-DCMAKE_CXX_STANDARD=${{ matrix.cxx_standard }}",
            "-DCMAKE_CXX_STANDARD_REQUIRED=ON",
            "-DCMAKE_CXX_EXTENSIONS=OFF"
          )
        }
        if ("${{ matrix.config.toolset }}" -ne "") {
          $arguments += @("-T", "${{ matrix.config.toolset }}")
        }
        cmake @arguments

    - name: Build
      shell: pwsh
      run: cmake --build build-cxx${{ matrix.cxx_standard }} --config Release --parallel

    - name: Test
      shell: pwsh
      run: ctest --test-dir build-cxx${{ matrix.cxx_standard }} -C Release --output-on-failure

  msvc-2022-cxx20:
    name: Windows MSVC 2022 C++20 compatibility
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup CMake
      uses: lukka/get-cmake@v4.3.2
      with:
        cmakeVersion: '3.31.5'
        useCloudCache: false

    - name: Configure CMake (Visual Studio 2022)
      shell: pwsh
      run: |
        cmake -B build-msvc-2022-cxx20 `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DCBOR_TAGS_BUILD_TESTS=ON `
          -DCMAKE_CXX_STANDARD=20 `
          -DCMAKE_CXX_STANDARD_REQUIRED=ON `
          -DCMAKE_CXX_EXTENSIONS=OFF

    - name: Build
      shell: pwsh
      run: cmake --build build-msvc-2022-cxx20 --config Release --parallel

    - name: Test
      shell: pwsh
      run: ctest --test-dir build-msvc-2022-cxx20 -C Release --output-on-failure

  std-expected-cxx23:
    name: Windows MSVC C++23 std::expected return tests
    runs-on: windows-2025

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup CMake
      uses: lukka/get-cmake@v4.3.2
      with:
        cmakeVersion: '4.3.2'
        useCloudCache: false

    - name: Configure CMake with std::expected
      shell: pwsh
      run: |
        cmake -B build-std-expected-cxx23 `
          -G "Visual Studio 18 2026" `
          -A x64 `
          -DCBOR_TAGS_BUILD_TESTS=ON `
          -DCBOR_TAGS_USE_STD_EXPECTED=ON `
          -DCMAKE_CXX_STANDARD=23 `
          -DCMAKE_CXX_STANDARD_REQUIRED=ON `
          -DCMAKE_CXX_EXTENSIONS=OFF

    - name: Build
      shell: pwsh
      run: cmake --build build-std-expected-cxx23 --config Release --parallel

    - name: Test
      shell: pwsh
      run: ctest --test-dir build-std-expected-cxx23 -C Release --output-on-failure

  optional-backends:
    name: ${{ matrix.config.name }} C++${{ matrix.cxx_standard }} ${{ matrix.backend.name }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        cxx_standard: [20, 26]
        config:
          - {
              name: "Windows MSVC",
              toolset: ""
            }
          - {
              name: "Windows Clang-CL",
              toolset: "ClangCL"
            }
        backend:
          - {
              name: "Boost.PFR names",
              id: "boost-pfr-names",
              option: "CBOR_TAGS_USE_BOOST_PFR_NAMES",
              feature: "boost-pfr-names"
            }
          - {
              name: "magic_enum names",
              id: "magic-enum-names",
              option: "CBOR_TAGS_USE_MAGIC_ENUM_NAMES",
              feature: "magic-enum-names"
            }

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup CMake
      uses: lukka/get-cmake@v4.3.2
      with:
        cmakeVersion: '4.3.2'
        useCloudCache: false

    - name: Bootstrap vcpkg
      uses: ./.github/actions/bootstrap-vcpkg

    - name: Configure CMake with ${{ matrix.backend.name }}
      shell: pwsh
      run: |
        $buildDir = "build-${{ matrix.backend.id }}-cxx${{ matrix.cxx_standard }}"
        $toolchainFile = Join-Path $env:VCPKG_ROOT "scripts\buildsystems\vcpkg.cmake"
        $arguments = @(
          "-B", $buildDir,
          "-G", "Visual Studio 18 2026",
          "-A", "x64",
          "-DCBOR_TAGS_BUILD_TESTS=ON",
          "-D${{ matrix.backend.option }}=ON",
          "-DCMAKE_TOOLCHAIN_FILE=$toolchainFile",
          "-DVCPKG_MANIFEST_FEATURES=${{ matrix.backend.feature }}"
        )
        if ("${{ matrix.cxx_standard }}" -eq "26") {
          # CMake 4.3 supports the VS 2026 generator but does not model its C++26 preview mode.
          $cxxFlags = "/std:c++latest"
          if ("${{ matrix.config.toolset }}" -eq "ClangCL") {
            $cxxFlags += " -Wno-unused-command-line-argument"
          }
          $arguments += @(
            "-DCMAKE_CXX_STANDARD=23",
            "-DCMAKE_CXX_STANDARD_REQUIRED=ON",
            "-DCMAKE_CXX_EXTENSIONS=OFF",
            "-DCMAKE_CXX_FLAGS_INIT=$cxxFlags"
          )
        } else {
          $arguments += @(
            "-DCMAKE_CXX_STANDARD=${{ matrix.cxx_standard }}",
            "-DCMAKE_CXX_STANDARD_REQUIRED=ON",
            "-DCMAKE_CXX_EXTENSIONS=OFF"
          )
        }
        if ("${{ matrix.config.toolset }}" -ne "") {
          $arguments += @("-T", "${{ matrix.config.toolset }}")
        }
        cmake @arguments

    - name: Build
      shell: pwsh
      run: cmake --build build-${{ matrix.backend.id }}-cxx${{ matrix.cxx_standard }} --config Release --parallel

    - name: Test
      shell: pwsh
      run: ctest --test-dir build-${{ matrix.backend.id }}-cxx${{ matrix.cxx_standard }} -C Release --output-on-failure
