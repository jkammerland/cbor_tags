name: Ubuntu Tests (GCC 12-16, LLVM 17-22)

on:
  push:
    branches: [ master, integration ]
  pull_request:
    branches: [ master, integration ]

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          # Ubuntu GCC configs
          - {
              name: "Ubuntu GCC 12",
              cc: "gcc-12",
              cxx: "g++-12",
              family: "gcc"
            }
          - {
              name: "Ubuntu GCC 13",
              cc: "gcc-13",
              cxx: "g++-13",
              family: "gcc"
            }
          - {
              name: "Ubuntu GCC 14",
              cc: "gcc-14",
              cxx: "g++-14",
              family: "gcc"
            }
          # Ubuntu Clang configs
          - {
              name: "Ubuntu Clang 17",
              cc: "clang-17",
              cxx: "clang++-17",
              family: "llvm",
              version: "17"
            }
          - {
              name: "Ubuntu Clang 18",
              cc: "clang-18",
              cxx: "clang++-18",
              family: "llvm",
              version: "18"
            }
          - {
              name: "Ubuntu Clang 19",
              cc: "clang-19",
              cxx: "clang++-19",
              family: "llvm",
              version: "19"
            }
          - {
              name: "Ubuntu Clang 20",
              cc: "clang-20",
              cxx: "clang++-20",
              family: "llvm",
              version: "20"
            }
          - {
              name: "Ubuntu Clang 21",
              cc: "clang-21",
              cxx: "clang++-21",
              family: "llvm",
              version: "21"
            }
          - {
              name: "Ubuntu Clang 22",
              cc: "clang-22",
              cxx: "clang++-22",
              family: "llvm",
              version: "22"
            }

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup CMake
      uses: lukka/get-cmake@v4.3.2
      with:
        cmakeVersion: '3.31.5'

    - name: Install GCC (Ubuntu)
      if: matrix.config.family == 'gcc'
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ matrix.config.cc }} ${{ matrix.config.cxx }}

    - name: Install LLVM/Clang (Ubuntu)
      if: matrix.config.family == 'llvm'
      run: |
        wget -q https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh ${{ matrix.config.version }}
        sudo apt-get install -y clang-${{ matrix.config.version }}

    - name: Configure CMake
      shell: bash
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCBOR_TAGS_BUILD_TESTS=ON \
          -DCMAKE_C_COMPILER=${{ matrix.config.cc }} \
          -DCMAKE_CXX_COMPILER=${{ matrix.config.cxx }}

    - name: Build
      shell: bash
      run: cmake --build build --config Release

    - name: Test
      working-directory: build
      shell: bash
      run: ctest -C Release --output-on-failure

  gcc-current:
    name: Ubuntu GCC ${{ matrix.gcc }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gcc: [15, 16]

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Build and test in Ubuntu 26.04 container
      shell: bash
      run: |
        docker run --rm \
          -v "${{ github.workspace }}:/work:ro,z" \
          -w /work \
          ubuntu:26.04 \
          bash -euxo pipefail -c '
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              ca-certificates \
              cmake \
              git \
              ninja-build \
              gcc-${{ matrix.gcc }} \
              g++-${{ matrix.gcc }}
            cmake -S /work -B /tmp/build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCBOR_TAGS_BUILD_TESTS=ON \
              -DCMAKE_C_COMPILER=gcc-${{ matrix.gcc }} \
              -DCMAKE_CXX_COMPILER=g++-${{ matrix.gcc }}
            cmake --build /tmp/build --parallel
            ctest --test-dir /tmp/build -C Release --output-on-failure
          '

  std-expected-cxx23:
    name: Ubuntu GCC 15 C++23 std::expected return tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Build and test std::expected return backend in C++23
      shell: bash
      run: |
        docker run --rm \
          -v "${{ github.workspace }}:/work:ro,z" \
          -w /work \
          ubuntu:26.04 \
          bash -euxo pipefail -c '
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              ca-certificates \
              cmake \
              git \
              ninja-build \
              gcc-15 \
              g++-15
            cmake -S /work -B /tmp/build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCBOR_TAGS_BUILD_TESTS=ON \
              -DCBOR_TAGS_USE_STD_EXPECTED=ON \
              -DCMAKE_CXX_STANDARD=23 \
              -DCMAKE_CXX_STANDARD_REQUIRED=ON \
              -DCMAKE_C_COMPILER=gcc-15 \
              -DCMAKE_CXX_COMPILER=g++-15
            cmake --build /tmp/build --parallel
            ctest --test-dir /tmp/build -C Release --output-on-failure
          '

  gcc-std-reflection:
    name: Fedora 44 GCC C++26 reflection tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Build and test GCC std reflection in Fedora 44
      shell: bash
      run: |
        docker run --rm \
          -v "${{ github.workspace }}:/work:ro,z" \
          -w /work \
          registry.fedoraproject.org/fedora:44 \
          bash -euxo pipefail -c '
            dnf -y install \
              cmake \
              gcc-c++ \
              git \
              ninja-build
            cmake --preset=release-std-reflection -B /tmp/build \
              -DCMAKE_C_COMPILER_LAUNCHER= \
              -DCMAKE_CXX_COMPILER_LAUNCHER=
            cmake --build /tmp/build --parallel
            ctest --test-dir /tmp/build --output-on-failure
          '

  boost-pfr-names:
    name: Ubuntu Boost.PFR named reflection tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup CMake
      uses: lukka/get-cmake@v4.3.2
      with:
        cmakeVersion: '3.31.5'

    - name: Install build tools
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache curl g++ gcc ninja-build tar unzip zip

    - name: Bootstrap vcpkg
      uses: ./.github/actions/bootstrap-vcpkg

    - name: Configure CMake with Boost.PFR names
      shell: bash
      run: |
        cmake --preset=boost-pfr-names \
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_MANIFEST_FEATURES=boost-pfr-names

    - name: Build
      shell: bash
      run: cmake --build --preset=boost-pfr-names

    - name: Test
      shell: bash
      run: ctest --preset=boost-pfr-names

  magic-enum-names:
    name: Ubuntu magic_enum CDDL enum-name tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup CMake
      uses: lukka/get-cmake@v4.3.2
      with:
        cmakeVersion: '3.31.5'

    - name: Install build tools
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache curl g++ gcc ninja-build tar unzip zip

    - name: Bootstrap vcpkg
      uses: ./.github/actions/bootstrap-vcpkg

    - name: Configure CMake with magic_enum names
      shell: bash
      run: |
        cmake --preset=magic-enum-names \
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_MANIFEST_FEATURES=magic-enum-names

    - name: Build
      shell: bash
      run: cmake --build --preset=magic-enum-names

    - name: Test
      shell: bash
      run: ctest --preset=magic-enum-names

  installed-package-consumer:
    name: Ubuntu installed package consumer (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              name: "cxx20-system-expected",
              cxx_standard: "20",
              configure_flags: "-DCBOR_TAGS_USE_SYSTEM_EXPECTED=ON",
              vcpkg_features: "",
              vcpkg_no_default_features: "OFF",
              consumer_mode: "default"
            }
          - {
              name: "cxx23-std-expected",
              cxx_standard: "23",
              configure_flags: "-DCBOR_TAGS_USE_STD_EXPECTED=ON",
              vcpkg_features: "std-expected",
              vcpkg_no_default_features: "ON",
              consumer_mode: "default"
            }
          - {
              name: "magic-enum-names",
              cxx_standard: "20",
              configure_flags: "-DCBOR_TAGS_USE_SYSTEM_EXPECTED=ON -DCBOR_TAGS_USE_MAGIC_ENUM_NAMES=ON",
              vcpkg_features: "magic-enum-names",
              vcpkg_no_default_features: "OFF",
              consumer_mode: "magic_enum"
            }
          - {
              name: "boost-pfr-names",
              cxx_standard: "20",
              configure_flags: "-DCBOR_TAGS_USE_SYSTEM_EXPECTED=ON -DCBOR_TAGS_USE_BOOST_PFR_NAMES=ON",
              vcpkg_features: "boost-pfr-names",
              vcpkg_no_default_features: "OFF",
              consumer_mode: "boost_pfr"
            }

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup CMake
      uses: lukka/get-cmake@v4.3.2
      with:
        cmakeVersion: '3.31.5'

    - name: Install build tools
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y curl g++ gcc ninja-build tar unzip zip

    - name: Bootstrap vcpkg
      uses: ./.github/actions/bootstrap-vcpkg

    - name: Install cbor_tags
      shell: bash
      run: |
        build_dir="${GITHUB_WORKSPACE}/build-install-${{ matrix.name }}"
        install_prefix="${RUNNER_TEMP}/cbor-tags-prefix-${{ matrix.name }}"
        configure_flags="${{ matrix.configure_flags }}"
        vcpkg_features="${{ matrix.vcpkg_features }}"
        vcpkg_no_default_features="${{ matrix.vcpkg_no_default_features }}"
        feature_args=()
        if [[ "${vcpkg_no_default_features}" == "ON" ]]; then
          feature_args+=(-DVCPKG_MANIFEST_NO_DEFAULT_FEATURES=ON)
        fi
        if [[ -n "${vcpkg_features}" ]]; then
          feature_args+=(-DVCPKG_MANIFEST_FEATURES="${vcpkg_features}")
        fi

        cmake -S . -B "${build_dir}" -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCBOR_TAGS_BUILD_TESTS=OFF \
          -DCBOR_TAGS_INSTALL=ON \
          -DCMAKE_CXX_STANDARD=${{ matrix.cxx_standard }} \
          -DCMAKE_CXX_STANDARD_REQUIRED=ON \
          -DCMAKE_CXX_EXTENSIONS=OFF \
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
          -DCMAKE_INSTALL_PREFIX="${install_prefix}" \
          ${configure_flags} \
          "${feature_args[@]}"
        cmake --build "${build_dir}" --parallel
        cmake --install "${build_dir}"

    - name: Build downstream consumer
      shell: bash
      run: |
        consumer_dir="${RUNNER_TEMP}/cbor-tags-consumer-${{ matrix.name }}"
        mkdir -p "${consumer_dir}"
        cat > "${consumer_dir}/CMakeLists.txt" <<EOF
        cmake_minimum_required(VERSION 3.25)
        project(cbor_tags_installed_consumer LANGUAGES CXX)
        find_package(cbor_tags REQUIRED)
        add_executable(consumer main.cpp)
        target_link_libraries(consumer PRIVATE cbor::tags)
        set_property(TARGET consumer PROPERTY CXX_STANDARD ${{ matrix.cxx_standard }})
        set_property(TARGET consumer PROPERTY CXX_STANDARD_REQUIRED ON)
        set_property(TARGET consumer PROPERTY CXX_EXTENSIONS OFF)
        EOF

        if [[ "${{ matrix.consumer_mode }}" == "magic_enum" ]]; then
          cat > "${consumer_dir}/main.cpp" <<'EOF'
        #include <cbor_tags/extensions/cbor_visualization.h>
        #include <fmt/format.h>

        #include <cstdint>
        #include <string>

        enum class Color : std::uint8_t { red = 1, green = 2 };

        int main() {
            fmt::memory_buffer schema;
            cbor::tags::cddl_schema_to<Color>(
                schema,
                {.row_options = {.format_by_rows = false}, .enum_mode = cbor::tags::CDDLEnumMode::named_values});
            const auto text = fmt::to_string(schema);
            return text.find("red") == std::string::npos ? 1 : 0;
        }
        EOF
        elif [[ "${{ matrix.consumer_mode }}" == "boost_pfr" ]]; then
          cat > "${consumer_dir}/main.cpp" <<'EOF'
        #include <cbor_tags/cbor_decoder.h>
        #include <cbor_tags/cbor_encoder.h>
        #include <cbor_tags/cbor_reflection_config.h>
        #include <cbor_tags/extensions/cbor_visualization.h>
        #include <fmt/format.h>

        #include <cstddef>
        #include <cstdint>
        #include <string>
        #include <vector>

        struct Person {
            std::uint8_t age;
            std::string name;
        };

        int main() {
            static_assert(CBOR_TAGS_HAS_BOOST_PFR_NAMES == 1);

            fmt::memory_buffer schema;
            cbor::tags::cddl_schema_to<cbor::tags::as_named_map<Person>>(
                schema, {.row_options = {.format_by_rows = false}, .root_name = "person"});
            const auto text = fmt::to_string(schema);
            if (text.find("age: uint") == std::string::npos || text.find("name: tstr") == std::string::npos) {
                return 1;
            }

            Person input{.age = 42, .name = "Ada"};
            std::vector<std::byte> bytes;
            auto enc = cbor::tags::make_encoder(bytes);
            if (!enc(cbor::tags::as_named_map{input})) {
                return 2;
            }

            Person decoded{};
            auto dec = cbor::tags::make_decoder(bytes);
            if (!dec(cbor::tags::as_named_map{decoded})) {
                return 3;
            }
            return decoded.age == input.age && decoded.name == input.name ? 0 : 4;
        }
        EOF
        else
          cat > "${consumer_dir}/main.cpp" <<'EOF'
        #include <cbor_tags/cbor_decoder.h>
        #include <cbor_tags/cbor_encoder.h>

        #include <cstddef>
        #include <cstdint>
        #include <vector>

        int main() {
            std::vector<std::byte> bytes;
            auto enc = cbor::tags::make_encoder(bytes);
            if (!enc(std::uint64_t{42})) {
                return 1;
            }

            std::uint64_t decoded{};
            auto dec = cbor::tags::make_decoder(bytes);
            if (!dec(decoded)) {
                return 2;
            }
            return decoded == 42U ? 0 : 3;
        }
        EOF
        fi

        build_dir="${GITHUB_WORKSPACE}/build-install-${{ matrix.name }}"
        install_prefix="${RUNNER_TEMP}/cbor-tags-prefix-${{ matrix.name }}"
        triplet="${VCPKG_DEFAULT_TRIPLET:-x64-linux}"
        deps_prefix="${build_dir}/vcpkg_installed/${triplet}"
        cmake -S "${consumer_dir}" -B "${consumer_dir}/build" -G Ninja \
          -DCMAKE_PREFIX_PATH="${install_prefix};${deps_prefix}"
        cmake --build "${consumer_dir}/build" --parallel
        "${consumer_dir}/build/consumer"
