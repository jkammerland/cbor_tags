name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              name: "Windows MSVC",
              os: windows-latest,
              cc: "cl",
              cxx: "cl",
              environment_script: "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvars64.bat"
            }
          # Windows Clang-CL configs
          - {
              name: "Windows Clang-CL 15",
              os: windows-latest,
              cc: "clang-cl",
              cxx: "clang-cl",
              clang_version: "15",
              environment_script: "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvars64.bat"
            }
          - {
              name: "Windows Clang-CL 16",
              os: windows-latest,
              cc: "clang-cl",
              cxx: "clang-cl",
              clang_version: "16",
              environment_script: "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvars64.bat"
            }
          - {
              name: "Windows Clang-CL 17",
              os: windows-latest,
              cc: "clang-cl",
              cxx: "clang-cl",
              clang_version: "17",
              environment_script: "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvars64.bat"
            }
          - {
              name: "Windows Clang-CL 18",
              os: windows-latest,
              cc: "clang-cl",
              cxx: "clang-cl",
              clang_version: "18",
              environment_script: "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvars64.bat"
            }
          - {
              name: "Windows Clang-CL 19",
              os: windows-latest,
              cc: "clang-cl",
              cxx: "clang-cl",
              clang_version: "19",
              environment_script: "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvars64.bat"
            }
          # macOS AppleClang configs
          - {
              name: "macOS AppleClang 15",
              os: macos-latest,
              cc: "clang",
              cxx: "clang++",
              xcode_version: "15.0"
            }
          - {
              name: "macOS AppleClang 16",
              os: macos-latest,
              cc: "clang",
              cxx: "clang++",
              xcode_version: "16.0"
            }
          # Ubuntu GCC configs
          - {
              name: "Ubuntu GCC 12",
              os: ubuntu-latest,
              cc: "gcc-12",
              cxx: "g++-12"
            }
          - {
              name: "Ubuntu GCC 13",
              os: ubuntu-latest,
              cc: "gcc-13",
              cxx: "g++-13"
            }
          - {
              name: "Ubuntu GCC 14",
              os: ubuntu-latest,
              cc: "gcc-14",
              cxx: "g++-14"
            }
          - {
              name: "Ubuntu Clang 18",
              os: ubuntu-latest,
              cc: "clang-18",
              cxx: "clang++-18"
            }

    steps:
    - uses: actions/checkout@v3

    - name: Install GCC 12 (Ubuntu)
      if: matrix.config.os == 'ubuntu-latest' && matrix.config.cc == 'gcc-12'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-12 g++-12

    - name: Install GCC 13 (Ubuntu)
      if: matrix.config.os == 'ubuntu-latest' && matrix.config.cc == 'gcc-13'
      run: |
        sudo add-apt-repository ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo apt-get install -y gcc-13 g++-13

    - name: Install GCC 14 (Ubuntu)
      if: matrix.config.os == 'ubuntu-latest' && matrix.config.cc == 'gcc-14'
      run: |
        sudo add-apt-repository ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo apt-get install -y gcc-14 g++-14

    - name: Install Clang 18 (Ubuntu)
      if: matrix.config.os == 'ubuntu-latest' && matrix.config.cc == 'clang-18'
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 18
        sudo apt-get install -y clang-18

    - name: Setup Xcode (macOS)
      if: matrix.config.os == 'macos-latest'
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ matrix.config.xcode_version }}

    - name: Install LLVM and Clang (Windows Clang-CL)
      if: matrix.config.os == 'windows-latest' && matrix.config.cc == 'clang-cl'
      uses: KyleMayes/install-llvm-action@v1
      with:
        version: ${{ matrix.config.clang_version }}
        directory: ${{ runner.temp }}/llvm

    - name: Configure CMake
      shell: bash
      run: |
        if [ "${{ matrix.config.os }}" == "windows-latest" ]; then
          if [ "${{ matrix.config.cc }}" == "clang-cl" ]; then
            # For Clang-CL, use the Visual Studio generator with ClangCL toolset
            cmd.exe /c "call \"${{ matrix.config.environment_script }}\" && cmake -B build -G \"Visual Studio 17 2022\" -A x64 -T ClangCL -DCBOR_TAGS_BUILD_TESTS=ON"
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DCBOR_TAGS_BUILD_TESTS=ON
          fi
        else
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCBOR_TAGS_BUILD_TESTS=ON \
            -DCMAKE_C_COMPILER=${{ matrix.config.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.config.cxx }}
        fi

    - name: Build
      shell: bash
      run: cmake --build build --config Release

    - name: Test
      working-directory: build
      shell: bash
      run: ctest -C Release --output-on-failure