name: Quality (Lint, Coverage)

on:
  push:
    branches: [ master, integration ]
  pull_request:
    branches: [ master, integration ]

permissions:
  contents: read

jobs:
  minimum-cmake:
    name: CMake 3.23 Raw Roundtrip
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup CMake 3.23.5
      uses: lukka/get-cmake@v4.3.2
      with:
        cmakeVersion: '3.23.5'

    - name: Install build tools
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ gcc ninja-build

    - name: Configure
      shell: bash
      run: |
        cmake -S . -B build/minimum-cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCBOR_TAGS_BUILD_CLI=ON \
          -DCBOR_TAGS_BUILD_EXAMPLES=ON \
          -DCBOR_TAGS_BUILD_TESTS=OFF

    - name: Build
      shell: bash
      run: cmake --build build/minimum-cmake --parallel

    - name: Test
      shell: bash
      run: |
        ./build/minimum-cmake/examples/cbor_tags_basic_roundtrip
        ./build/minimum-cmake/tools/cbor_tags_cli diagnostic --input hex 01

  cmake-3-25-features:
    name: CMake 3.25 Tests, Benchmark, Install
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup CMake 3.25.3
      uses: lukka/get-cmake@v4.3.2
      with:
        cmakeVersion: '3.25.3'

    - name: Install build tools
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y curl g++ gcc ninja-build tar unzip zip

    - name: Bootstrap vcpkg
      uses: ./.github/actions/bootstrap-vcpkg

    - name: Configure tests, benchmarks, and install
      shell: bash
      run: |
        cmake -S . -B build/cmake-3.25 -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=20 \
          -DCMAKE_CXX_STANDARD_REQUIRED=ON \
          -DCMAKE_CXX_EXTENSIONS=OFF \
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
          -DCMAKE_INSTALL_PREFIX="${RUNNER_TEMP}/cbor-tags-cmake-3.25" \
          -DCBOR_TAGS_BUILD_TESTS=ON \
          -DCBOR_TAGS_BUILD_BENCHMARKS=ON \
          -DCBOR_TAGS_INSTALL=ON \
          -DCBOR_TAGS_USE_SYSTEM_EXPECTED=ON

    - name: Build tests and benchmark target
      shell: bash
      run: |
        cmake --build build/cmake-3.25 \
          --target tests test_decode_stack_floor test_unsigned_char cbor_tags_cli bench_encoder \
          --parallel

    - name: Run tests
      shell: bash
      run: ctest --test-dir build/cmake-3.25 --exclude-regex '^bench_' --output-on-failure

    - name: Install package
      shell: bash
      run: cmake --install build/cmake-3.25

    - name: Build installed package consumer
      shell: bash
      run: |
        cmake -S test_package -B build/cmake-3.25-consumer -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=20 \
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
          -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/cbor-tags-cmake-3.25;${GITHUB_WORKSPACE}/build/cmake-3.25/vcpkg_installed/x64-linux"
        cmake --build build/cmake-3.25-consumer --parallel
        ./build/cmake-3.25-consumer/test_package

  format-and-tidy:
    name: C++ Format + Clang-Tidy
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup CMake
      uses: lukka/get-cmake@v4.3.2
      with:
        cmakeVersion: '3.31.5'

    - name: Install LLVM 21 tools
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ca-certificates ccache gnupg ninja-build wget
        wget -q https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21
        sudo apt-get install -y clang-format-21 clang-tidy-21

    - name: Run lint
      shell: bash
      run: |
        CC=clang-21 \
        CXX=clang++-21 \
        CLANG_FORMAT=clang-format-21 \
        CLANG_TIDY_EXE=clang-tidy-21 \
        scripts/lint-cxx.sh

  coverage:
    name: C++ Coverage Report
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup CMake
      uses: lukka/get-cmake@v4.3.2
      with:
        cmakeVersion: '3.31.5'

    - name: Install coverage tools
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache gcovr g++ gcc ninja-build

    - name: Generate coverage report
      shell: bash
      run: scripts/coverage.sh

    - name: Publish coverage summary
      if: always()
      shell: bash
      run: |
        if [[ ! -f coverage-report/coverage-summary.md ]]; then
          echo "coverage-report/coverage-summary.md was not generated" >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi
        cat coverage-report/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: coverage-report
        path: coverage-report
        if-no-files-found: error

  conan-package:
    name: Conan package consumer (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "default", cppstd: "20", options: "" }
          - { name: "std-expected", cppstd: "23", options: "-o cbor-tags/*:std_expected=True" }
          - { name: "boost-pfr-names", cppstd: "20", options: "-o cbor-tags/*:boost_pfr_names=True" }
          - { name: "magic-enum-names", cppstd: "20", options: "-o cbor-tags/*:magic_enum_names=True" }

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup CMake
      uses: lukka/get-cmake@v4.3.2
      with:
        cmakeVersion: '3.31.5'

    - name: Install Conan tools
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ gcc ninja-build python3-pip
        python3 -m pip install --user --break-system-packages "conan>=2,<3"
        echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

    - name: Create and test package
      shell: bash
      run: |
        conan profile detect --force
        options="${{ matrix.options }}"
        conan create . \
          --build=missing \
          -s build_type=Release \
          -s compiler.cppstd=${{ matrix.cppstd }} \
          -c tools.cmake.cmaketoolchain:generator=Ninja \
          ${options}

  conan-stl-only-package:
    name: Conan package consumer (stl-only)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Create and test STL-only package in Fedora
      shell: bash
      run: |
        docker run --rm \
          -v "${{ github.workspace }}:/work:ro,z" \
          -w /work \
          registry.fedoraproject.org/fedora:44 \
          bash -euxo pipefail -c '
            dnf -y install \
              cmake \
              gcc-c++ \
              git \
              ninja-build \
              python3-pip
            python3 -m pip install --user "conan>=2,<3"
            export PATH="${HOME}/.local/bin:${PATH}"
            conan profile detect --force
            conan create . \
              --build=missing \
              -s build_type=Release \
              -s compiler.cppstd=26 \
              -c tools.cmake.cmaketoolchain:generator=Ninja \
              -o cbor-tags/*:stl_only=True
          '

  benchmark-build:
    name: C++ Benchmark Compile (${{ matrix.config.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              name: "GCC",
              cc: "gcc",
              cxx: "g++",
              family: "gcc"
            }
          - {
              name: "LLVM 21",
              cc: "clang-21",
              cxx: "clang++-21",
              family: "llvm",
              version: "21"
            }

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup CMake
      uses: lukka/get-cmake@v4.3.2
      with:
        cmakeVersion: '3.31.5'

    - name: Install GCC build tools
      if: matrix.config.family == 'gcc'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache g++ gcc ninja-build

    - name: Install LLVM build tools
      if: matrix.config.family == 'llvm'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ca-certificates ccache gnupg ninja-build wget
        wget -q https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh ${{ matrix.config.version }}
        sudo apt-get install -y clang-${{ matrix.config.version }}

    - name: Configure benchmarks
      shell: bash
      run: |
        cmake -B build/benchmarks -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER=${{ matrix.config.cc }} \
          -DCMAKE_CXX_COMPILER=${{ matrix.config.cxx }} \
          -DCMAKE_CXX_EXTENSIONS=OFF \
          -DCBOR_TAGS_BUILD_BENCHMARKS=ON \
          -DCBOR_TAGS_BUILD_TESTS=OFF \
          -DCBOR_TAGS_USE_DEV_SETTINGS=ON

    - name: Build benchmarks
      shell: bash
      run: cmake --build build/benchmarks --parallel
